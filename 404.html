<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ToolHub</title>
    <!-- SPA redirect for GitHub Pages: encodes the deep path and bounces to index,
         where the restore script in index.html rebuilds the URL for the router.
         pathSegmentsToKeep=1 keeps the /toolhub/ project subpath. -->
    <script>
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
